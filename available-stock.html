<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Available Stock | AnyBike</title>
<style>
:root{
  --red:#d71920;
  --black:#111;
  --dark:#1b1b1b;
  --light:#f6f6f6;
  --border:#ddd;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff;color:#111}
header{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px 24px;border-bottom:1px solid #eee;flex-wrap:wrap}
.logo{max-width:250px;height:auto}
nav a{margin:0 9px;color:#111;text-decoration:none;font-weight:700}
nav a:hover{color:var(--red)}
.hero{background:#111;color:#fff;text-align:center;padding:46px 18px}
.hero h1{margin:0 0 10px;font-size:44px}
.hero p{margin:0;color:#ddd;font-size:18px}
.wrap{max-width:1200px;margin:auto;padding:24px 16px}
.toolbar{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:18px}
input,select,button{padding:12px;border-radius:8px;border:1px solid var(--border);font-size:15px}
button{background:var(--red);color:#fff;border:0;font-weight:800;cursor:pointer}
button.dark{background:#111}
button.watch{background:#fff;color:#111;border:1px solid #111}
button.watch.active{background:#111;color:#fff}
.count{font-weight:900;margin:14px 0 18px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card{border:1px solid #ddd;border-radius:15px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.08);background:#fff}
.placeholder{height:215px;background:#f4f4f4;display:flex;align-items:center;justify-content:center;text-align:center;position:relative}
.placeholder img{max-width:72%;opacity:.12;position:absolute}
.placeholder strong{position:relative;font-size:20px;line-height:1.35}
.body{padding:16px}
.body h3{margin:0 0 8px;font-size:22px}
.meta{color:#555;line-height:1.6}
.price{font-size:24px;font-weight:900;color:var(--red);margin:12px 0}
.status{font-weight:900}
.actions{display:grid;gap:8px;margin-top:13px}
.small-note{font-size:13px;color:#666;margin-top:8px}
footer{background:#111;color:#ccc;text-align:center;padding:28px;margin-top:40px}
@media(max-width:1000px){.toolbar{grid-template-columns:1fr 1fr 1fr}.grid{grid-template-columns:1fr 1fr}}
@media(max-width:650px){.toolbar,.grid{grid-template-columns:1fr}.hero h1{font-size:34px}nav a{display:inline-block;margin:5px}.logo{max-width:210px}}
</style>
</head>
<body>

<header>
  <a href="index.html"><img class="logo" src="anybike-logo-new.jpg" alt="AnyBike"></a>
  <nav>
    <a href="index.html">Home</a>
    <a href="available-stock.html">Available Stock</a>
    <a href="sell.html">Sell Your Motorcycle</a>
    <a href="request.html">Request a Motorcycle</a>
    <a href="export.html">Export Services</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1 data-t="title">Available Stock</h1>
  <p data-t="subtitle">Browse motorcycles available through AnyBike. Worldwide export enquiries welcome.</p>
</section>

<main class="wrap">

  <section class="toolbar">
    <input id="search" placeholder="Search make, model or variant">
    <select id="make"><option value="">All Makes</option></select>
    <select id="model"><option value="">All Models</option></select>
    <select id="year"><option value="">All Years</option></select>
    <select id="priceRange">
      <option value="">All Prices</option>
      <option value="0-3000">Up to £3,000</option>
      <option value="3000-6000">£3,000 - £6,000</option>
      <option value="6000-10000">£6,000 - £10,000</option>
      <option value="10000-999999">£10,000+</option>
    </select>
    <select id="currency">
      <option value="GBP">GBP £</option>
      <option value="EUR">EUR €</option>
      <option value="USD">USD $</option>
      <option value="AUD">AUD A$</option>
      <option value="NZD">NZD NZ$</option>
      <option value="CAD">CAD C$</option>
      <option value="AED">AED د.إ</option>
    </select>
    <select id="language">
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="ar">العربية</option>
    </select>
  </section>

  <div class="count" id="count"></div>
  <section class="grid" id="grid"></section>

</main>

<footer>
  AnyBike.co.uk — UK Motorcycle Export Specialists
</footer>

<script>
const logoFile = "anybike-logo-new.jpg";

const rates = {
  GBP: {symbol:"£", rate:1},
  EUR: {symbol:"€", rate:1.18},
  USD: {symbol:"$", rate:1.34},
  AUD: {symbol:"A$", rate:2.05},
  NZD: {symbol:"NZ$", rate:2.23},
  CAD: {symbol:"C$", rate:1.84},
  AED: {symbol:"د.إ", rate:4.92}
};

const words = {
  en:{title:"Available Stock",subtitle:"Browse motorcycles available through AnyBike. Worldwide export enquiries welcome.",request:"Request More Information",buy:"I Would Like To Buy This Bike",watch:"♡ Add To Watchlist",watched:"✓ Added To Watchlist",register:"Register Free<br>To View Images",available:"Available"},
  fr:{title:"Stock Disponible",subtitle:"Parcourez les motos disponibles via AnyBike. Exportation mondiale bienvenue.",request:"Demander Plus D’informations",buy:"Je Souhaite Acheter Cette Moto",watch:"♡ Ajouter À La Liste",watched:"✓ Ajouté À La Liste",register:"Inscrivez-vous Gratuitement<br>Pour Voir Les Images",available:"Disponible"},
  de:{title:"Verfügbarer Bestand",subtitle:"Motorräder verfügbar über AnyBike. Weltweite Exportanfragen willkommen.",request:"Weitere Informationen Anfordern",buy:"Ich Möchte Dieses Motorrad Kaufen",watch:"♡ Zur Merkliste Hinzufügen",watched:"✓ Zur Merkliste Hinzugefügt",register:"Kostenlos Registrieren<br>Um Bilder Zu Sehen",available:"Verfügbar"},
  es:{title:"Stock Disponible",subtitle:"Motos disponibles a través de AnyBike. Consultas de exportación mundial bienvenidas.",request:"Solicitar Más Información",buy:"Quiero Comprar Esta Moto",watch:"♡ Añadir A Favoritos",watched:"✓ Añadido A Favoritos",register:"Regístrate Gratis<br>Para Ver Imágenes",available:"Disponible"},
  ar:{title:"المخزون المتاح",subtitle:"تصفح الدراجات النارية المتاحة عبر AnyBike. نرحب باستفسارات التصدير العالمية.",request:"طلب المزيد من المعلومات",buy:"أرغب في شراء هذه الدراجة",watch:"♡ أضف إلى قائمة المتابعة",watched:"✓ تمت الإضافة",register:"سجل مجاناً<br>لعرض الصور",available:"متاح"}
};

const bikes = [
  {id:"AB001",make:"Honda",model:"CBR600RR",variant:"ABS",year:"2019",mileage:8200,cc:599,price:6495,status:"Available"},
  {id:"AB002",make:"Yamaha",model:"MT-09",variant:"",year:"2021",mileage:5400,cc:890,price:6995,status:"Available"},
  {id:"AB003",make:"BMW",model:"R1250GS",variant:"TE",year:"2020",mileage:14500,cc:1254,price:10995,status:"Available"},
  {id:"AB004",make:"Triumph",model:"Street Triple",variant:"RS",year:"2022",mileage:3900,cc:765,price:8495,status:"Available"},
  {id:"AB005",make:"Kawasaki",model:"Z900",variant:"",year:"2021",mileage:6100,cc:948,price:7295,status:"Available"},
  {id:"AB006",make:"Ducati",model:"Panigale V2",variant:"",year:"2020",mileage:4800,cc:955,price:11995,status:"Available"}
];

function currentLang(){return document.getElementById("language").value}
function t(key){return words[currentLang()][key] || words.en[key]}
function currentCurrency(){return document.getElementById("currency").value}

function formatPrice(gbp){
  const c = rates[currentCurrency()];
  const converted = Math.round(gbp * c.rate);
  return c.symbol + converted.toLocaleString("en-GB");
}

function formatMiles(n){
  return Number(n).toLocaleString("en-GB") + " miles";
}

function populateFilters(){
  document.getElementById("make").innerHTML =
    '<option value="">All Makes</option>' +
    [...new Set(bikes.map(b=>b.make))].sort().map(x=>`<option>${x}</option>`).join("");

  document.getElementById("year").innerHTML =
    '<option value="">All Years</option>' +
    [...new Set(bikes.map(b=>b.year))].sort((a,b)=>b-a).map(x=>`<option>${x}</option>`).join("");

  updateModels();
}

function updateModels(){
  const make = document.getElementById("make").value;
  const models = [...new Set(bikes.filter(b=>!make || b.make===make).map(b=>b.model))].sort();
  document.getElementById("model").innerHTML =
    '<option value="">All Models</option>' + models.map(x=>`<option>${x}</option>`).join("");
}

function render(){
  document.querySelector("[data-t='title']").innerHTML = t("title");
  document.querySelector("[data-t='subtitle']").innerHTML = t("subtitle");

  const q = document.getElementById("search").value.toLowerCase();
  const make = document.getElementById("make").value;
  const model = document.getElementById("model").value;
  const year = document.getElementById("year").value;
  const priceRange = document.getElementById("priceRange").value;

  const list = bikes.filter(b=>{
    const text = `${b.make} ${b.model} ${b.variant}`.toLowerCase();
    if(q && !text.includes(q)) return false;
    if(make && b.make !== make) return false;
    if(model && b.model !== model) return false;
    if(year && b.year !== year) return false;
    if(priceRange){
      const [min,max] = priceRange.split("-").map(Number);
      if(b.price < min || b.price > max) return false;
    }
    return true;
  });

  document.getElementById("count").textContent =
    `${list.length} motorcycles currently available`;

  document.getElementById("grid").innerHTML = list.map(b=>{
    const watched = isWatched(b.id);
    return `
      <article class="card">
        <div class="placeholder">
          <img src="${logoFile}" alt="">
          <strong>${t("register")}</strong>
        </div>
        <div class="body">
          <h3>${b.make} ${b.model}</h3>
          <div class="meta">
            ${b.variant ? `<div>${b.variant}</div>` : ""}
            <div>${b.year} | ${formatMiles(b.mileage)} | ${b.cc}cc</div>
          </div>
          <div class="price">${formatPrice(b.price)}</div>
          <div class="status">${t("available")}</div>
          <div class="actions">
            <button onclick="enquire('${b.id}','info')">${t("request")}</button>
            <button class="dark" onclick="enquire('${b.id}','buy')">${t("buy")}</button>
            <button class="watch ${watched ? "active" : ""}" onclick="toggleWatch('${b.id}', this)">
              ${watched ? t("watched") : t("watch")}
            </button>
          </div>
          <div class="small-note">Supplier details and exact location are not shown publicly.</div>
        </div>
      </article>
    `;
  }).join("");
}

function findBike(id){return bikes.find(b=>b.id===id)}

function enquire(id,type){
  const b = findBike(id);
  const subject = encodeURIComponent(type==="buy"
    ? `I would like to buy this bike: ${b.make} ${b.model}`
    : `Request more information: ${b.make} ${b.model}`);
  const body = encodeURIComponent(
`Hello AnyBike,

I am interested in:

${b.make} ${b.model}
${b.variant || ""}
${b.year}
${formatPrice(b.price)}

Destination country:
Name:
Phone:

Thanks`);
  window.location.href = `mailto:sales@anybike.co.uk?subject=${subject}&body=${body}`;
}

function getWatchlist(){
  return JSON.parse(localStorage.getItem("anybike_watchlist") || "[]");
}

function saveWatchlist(list){
  localStorage.setItem("anybike_watchlist", JSON.stringify(list));
}

function isWatched(id){
  return getWatchlist().includes(id);
}

function toggleWatch(id, btn){
  let list = getWatchlist();

  if(!list.includes(id)){
    list.push(id);
    const email = localStorage.getItem("anybike_email") ||
      prompt("Enter your email to save this bike to your future AnyBike dashboard:");
    if(email) localStorage.setItem("anybike_email", email);
  }

  saveWatchlist(list);
  btn.textContent = t("watched");
  btn.classList.add("active");
}

["search","model","year","priceRange","currency","language"].forEach(id=>{
  document.getElementById(id).addEventListener("input", render);
  document.getElementById(id).addEventListener("change", render);
});

document.getElementById("make").addEventListener("change", ()=>{
  updateModels();
  render();
});

populateFilters();
render();
</script>

</body>
</html>
