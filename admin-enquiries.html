
```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Enquiries | AnyBike</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --red:#ed1c24;
  --line:rgba(255,255,255,.12);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#050505;
  color:#fff;
}

header{
  background:#0b0b0b;
  border-bottom:1px solid var(--line);
  padding:20px;
}

h1{
  margin:0;
  color:var(--red);
}

.wrap{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin-bottom:24px;
}

.stat{
  background:#111;
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
}

.stat strong{
  display:block;
  font-size:28px;
  color:var(--red);
}

.enquiry{
  background:#111;
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
}

.row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
  margin-bottom:10px;
}

.label{
  color:#999;
  font-size:13px;
}

.status{
  background:#222;
  color:#fff;
  border:1px solid #444;
  padding:10px;
  border-radius:10px;
}

select{
  width:100%;
  padding:10px;
  border-radius:10px;
}

textarea{
  width:100%;
  min-height:100px;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}

button{
  background:var(--red);
  color:#fff;
  border:0;
  border-radius:999px;
  padding:12px 18px;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}

.message{
  background:#181818;
  border-radius:10px;
  padding:12px;
  margin-top:10px;
}

.reply{
  background:#0d2333;
  border-radius:10px;
  padding:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <h1>AnyBike Enquiries</h1>
</header>

<div class="wrap">

  <div class="stats">
    <div class="stat">
      <div>New</div>
      <strong id="newCount">0</strong>
    </div>

    <div class="stat">
      <div>Offer Made</div>
      <strong id="offerCount">0</strong>
    </div>

    <div class="stat">
      <div>Reserved</div>
      <strong id="reservedCount">0</strong>
    </div>

    <div class="stat">
      <div>Sold</div>
      <strong id="soldCount">0</strong>
    </div>
  </div>

  <div id="enquiries">Loading enquiries...</div>

</div>

<script>
const SUPABASE_URL="https://tuehtnezhdnkqbbhttgp.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_mrkBKDxEPVmdj2n7gPWsbg_l4CShtcK";

const sb=supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

async function loadEnquiries(){

  const {data,error}=await sb
    .from("bike_enquiries")
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    document.getElementById("enquiries").innerHTML=
      error.message;
    return;
  }

  render(data||[]);
}

function render(rows){

  document.getElementById("newCount").textContent=
    rows.filter(r=>r.status==="New").length;

  document.getElementById("offerCount").textContent=
    rows.filter(r=>r.status==="Offer Made").length;

  document.getElementById("reservedCount").textContent=
    rows.filter(r=>r.status==="Reserved").length;

  document.getElementById("soldCount").textContent=
    rows.filter(r=>r.status==="Sold").length;

  const box=document.getElementById("enquiries");

  if(!rows.length){
    box.innerHTML="<p>No enquiries yet.</p>";
    return;
  }

  box.innerHTML=rows.map(r=>`

    <div class="enquiry">

      <div class="row">

        <div>
          <div class="label">Question</div>
          <strong>${r.question_type||""}</strong>
        </div>

        <div>
          <div class="label">Bike ID</div>
          <strong>${r.bike_id}</strong>
        </div>

        <div>
          <div class="label">Customer</div>
          <strong>${r.customer_name||""}</strong>
        </div>

        <div>
          <div class="label">Phone</div>
          <strong>${r.customer_phone||""}</strong>
        </div>

      </div>

      <div class="row">

        <div>
          <div class="label">Email</div>
          ${r.customer_email||""}
        </div>

        <div>
          <div class="label">Offer</div>
          ${r.offer_amount||"-"}
        </div>

        <div>
          <div class="label">Shipping Agent</div>
          ${r.buyer_shipping_agent||"-"}
        </div>

        <div>
          <div class="label">Status</div>

          <select onchange="updateStatus(${r.id},this.value)">
            <option ${r.status==="New"?"selected":""}>New</option>
            <option ${r.status==="Contacted"?"selected":""}>Contacted</option>
            <option ${r.status==="Waiting Buyer"?"selected":""}>Waiting Buyer</option>
            <option ${r.status==="Offer Made"?"selected":""}>Offer Made</option>
            <option ${r.status==="Reserved"?"selected":""}>Reserved</option>
            <option ${r.status==="Sold"?"selected":""}>Sold</option>
            <option ${r.status==="Closed"?"selected":""}>Closed</option>
          </select>

        </div>

      </div>

      <div class="message">
        ${r.message||"No message supplied"}
      </div>

      ${r.admin_reply ? `
      <div class="reply">
        <strong>Admin Reply</strong><br>
        ${r.admin_reply}
      </div>
      ` : ""}

      <textarea id="reply-${r.id}" placeholder="Reply to customer..."></textarea>

      <button onclick="saveReply(${r.id})">
        Save Reply
      </button>

    </div>

  `).join("");
}

async function updateStatus(id,status){

  await sb
    .from("bike_enquiries")
    .update({status})
    .eq("id",id);

  loadEnquiries();
}

async function saveReply(id){

  const reply=
    document.getElementById(`reply-${id}`).value;

  await sb
    .from("bike_enquiries")
    .update({
      admin_reply:reply,
      replied_at:new Date().toISOString()
    })
    .eq("id",id);

  loadEnquiries();
}

loadEnquiries();
</script>

</body>
</html>
```
