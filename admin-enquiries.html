<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Enquiries | AnyBike</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--red:#ed1c24;--line:rgba(255,255,255,.12)}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#050505;color:#fff}
header{background:#0b0b0b;border-bottom:1px solid var(--line);padding:20px}
  .header-inner{
  max-width:1800px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.admin-nav{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

.admin-nav a{
  color:#ddd;
  text-decoration:none;
  font-weight:700;
}

.admin-nav a:hover,
.admin-nav a.active{
  color:#ed1c24;
}
h1{margin:0;color:var(--red)}
.wrap{max-width:1500px;margin:auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat{background:#111;border:1px solid var(--line);border-radius:16px;padding:18px}
.stat strong{display:block;font-size:28px;color:var(--red)}
.enquiry{background:#111;border:1px solid var(--line);border-radius:16px;margin-bottom:10px;overflow:hidden}
.enquiry-row{display:grid;grid-template-columns:40px 1.5fr 1fr 1fr 1fr 140px;gap:12px;align-items:center;padding:14px 16px;cursor:pointer}
.enquiry-row:hover{background:#181818}
.row-title strong{color:#fff}
.small{color:#aaa;font-size:13px}
.badge{display:inline-block;border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px;text-align:center}
.badge-new{background:var(--red);color:#fff}
.badge-replied{background:#1d7a3a;color:#fff}
.badge-none{background:#333;color:#bbb}
.status-pill{background:#222;color:#fff;border:1px solid var(--line)}
.enquiry-detail{display:none;border-top:1px solid var(--line);padding:18px}
.enquiry.open .enquiry-detail{display:block}
.enquiry.open .arrow{transform:rotate(90deg)}
.arrow{font-size:22px;color:var(--red);transition:.2s}
.enquiry-top{display:grid;grid-template-columns:180px 1fr;gap:18px}
.bike-img{width:100%;height:135px;object-fit:cover;border-radius:14px;background:#222}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:12px}
.label{color:#999;font-size:13px;margin-bottom:3px}
.value strong{color:#fff}
select{width:100%;padding:10px;border-radius:10px}
textarea{width:100%;min-height:100px;border-radius:10px;padding:10px;margin-top:10px}
button,.btn{background:var(--red);color:#fff;border:0;border-radius:999px;padding:12px 18px;font-weight:900;cursor:pointer;margin-top:10px;display:inline-block;text-decoration:none;width:auto}
.quick-replies{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.quick-replies button{flex:0 0 auto;background:#fff;color:#111}
.message{background:#181818;border-radius:10px;padding:12px;margin-top:14px}
.reply{background:#0d2333;border-radius:10px;padding:12px;margin-top:10px}
.customer-msg{background:#231616}
  .message-thread{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:12px;
  margin-bottom:12px;
}

.msg{
  max-width:75%;
  padding:12px;
  border-radius:12px;
  line-height:1.4;
}

.msg.customer{
  align-self:flex-start;
  background:#222;
  border:1px solid rgba(255,255,255,.08);
}

.msg.admin{
  align-self:flex-end;
  background:#ed1c24;
  color:#fff;
}

.reply-area{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.reply-area textarea{
  flex:1;
}

 .menu-link{
  position:relative;
  padding-right:24px;
}
.msg-bubble{
  position:absolute;
  top:-10px;
  right:-6px;
  min-width:22px;
  height:22px;
  padding:0 6px;
  border-radius:999px;
  background:#ed1c24;
  color:#fff;
  font-size:11px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
}

  
@media(max-width:900px){
  .enquiry-row{grid-template-columns:30px 1fr;gap:8px}
  .hide-mobile{display:none}
  .enquiry-top{grid-template-columns:1fr}
}
</style>
</head>

<body>
<header>
  <div class="header-inner">

    <div class="admin-logo">
      <h1>AnyBike Admin</h1>
    </div>

    <nav class="admin-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="admin-stock.html">Stock</a>

      <a href="admin-enquiries.html" class="menu-link">
        Enquiries
        <span id="msgBubble" class="msg-bubble">0</span>
      </a>
    </nav>

  </div>
</header>
<div class="wrap">
<div class="stats">
  <div class="stat" onclick="filterEnquiries('customer')">
    <div>🔴 Customer Replied</div>
    <strong id="customerReplyCount">0</strong>
  </div>

  <div class="stat" onclick="filterEnquiries('waiting')">
    <div>🟡 Waiting Buyer</div>
    <strong id="waitingBuyerCount">0</strong>
  </div>

  <div class="stat" onclick="filterEnquiries('reserved')">
    <div>🟢 Reserved</div>
    <strong id="reservedCount">0</strong>
  </div>

  <div class="stat" onclick="filterEnquiries('all')">
    <div>All Enquiries</div>
    <strong id="totalCount">0</strong>
  </div>
</div>
  

  <div id="enquiries">Loading enquiries...</div>
</div>

<script>
const SUPABASE_URL="https://tuehtnezhdnkqbbhttgp.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_mrkBKDxEPVmdj2n7gPWsbg_l4CShtcK";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let latestMessageMap = {};
let openEnquiryId = null;
let allEnquiries = [];
let currentFilter = "all";

function safe(v){
  return v===undefined || v===null || v==="" ? "-" : String(v);
}

function money(v){
  return v ? "£" + Number(v).toLocaleString("en-GB") : "POA";
}

function toggleEnquiry(id){
  const el=document.getElementById(`enquiry-${id}`);
  if(!el) return;

  el.classList.toggle("open");

  if(el.classList.contains("open")){
    openEnquiryId=id;
  }else{
    openEnquiryId=null;
  }
}
  

function messageBadge(enquiryId){
  const m = latestMessageMap[String(enquiryId)];

  if(!m){
    return `<span class="badge badge-none">No messages</span>`;
  }

  const sender = String(m.sender || "").toLowerCase();

  if(sender.includes("customer")){
    return `<span class="badge badge-new">💬 NEW</span>`;
  }

  return `<span class="badge badge-replied">✓ Replied</span>`;
}
 function updateHeaderBubble(){
  let count = 0;

  Object.values(latestMessageMap).forEach(m=>{
    const sender = String(m.sender || "").toLowerCase();

    if(sender.includes("customer")){
      count++;
    }
  });

  const bubble = document.getElementById("msgBubble");

  if(!bubble) return;

  if(count > 0){
    bubble.style.display = "flex";
    bubble.textContent = count;
  }else{
    bubble.style.display = "none";
  }
}
  
async function loadLatestMessages(){

 
  
  const {data,error}=await sb
    .from("enquiry_messages")
    .select("id,enquiry_id,sender,message,created_at")
    .order("created_at",{ascending:false});

  latestMessageMap = {};

  if(error || !data) return;

  data.forEach(m=>{
    const key=String(m.enquiry_id);
    if(!latestMessageMap[key]){
      latestMessageMap[key]=m;
    }
  });
}

async function loadEnquiries(){
  await loadLatestMessages();
  updateHeaderBubble();

  const {data,error}=await sb
    .from("bike_enquiries")
    .select(`
      *,
      available_stock (
        id, make, model, variant, year, mileage, colour, status,
        price_gbp, image_url, raw_data,
        private_seller_name, private_seller_type, private_seller_phone,
        private_seller_email, private_seller_location, private_seller_postcode,
        private_source_name, private_source_url, private_listing_id
      )
    `)
    .order("created_at",{ascending:false});

  if(error){
    document.getElementById("enquiries").innerHTML =
      `<div style="color:#ff7676;font-weight:900">${error.message}</div>`;
    return;
  }

  render(data || []);
}

function render(rows){
if(document.getElementById("newCount"))
  document.getElementById("newCount").textContent =
    rows.filter(r=>r.status==="New").length;

if(document.getElementById("offerCount"))
  document.getElementById("offerCount").textContent =
    rows.filter(r=>r.status==="Offer Made").length;

if(document.getElementById("reservedCount"))
  document.getElementById("reservedCount").textContent =
    rows.filter(r=>r.status==="Reserved").length;

if(document.getElementById("soldCount"))
  document.getElementById("soldCount").textContent =
    rows.filter(r=>r.status==="Sold").length;

if(document.getElementById("totalCount"))
  document.getElementById("totalCount").textContent = rows.length;

const box=document.getElementById("enquiries");

if(!rows.length){
  box.innerHTML="<p>No enquiries yet.</p>";
  return;
}

box.innerHTML=rows.map(r=>{
  
    const b=r.available_stock || {};
    const latest = latestMessageMap[String(r.id)];
    const latestText = latest ? safe(latest.message).slice(0,80) : "";

    return `
      <div class="enquiry" id="enquiry-${r.id}">
        <div class="enquiry-row" onclick="toggleEnquiry(${r.id})">
          <div class="arrow">›</div>

          <div class="row-title">
            <strong>${safe(b.make)} ${safe(b.model)}</strong>
            <div class="small">${safe(b.variant)} ${safe(b.year)}</div>
          </div>

          <div>
            <strong>${safe(r.customer_name)}</strong>
            <div class="small">${safe(r.customer_email)}</div>
          </div>

          <div class="hide-mobile">
            ${safe(r.destination_country)}
            <div class="small">${safe(r.customer_phone)}</div>
          </div>

          <div class="hide-mobile">
            <span class="badge status-pill">${safe(r.status || "New")}</span>
            <div class="small">${latestText}</div>
          </div>

          <div>
            ${messageBadge(r.id)}
          </div>
        </div>

        <div class="enquiry-detail" onclick="event.stopPropagation()">
          <div class="enquiry-top">
            <div>
              ${b.image_url ? `<img class="bike-img" src="${b.image_url}" alt="">` : `<div class="bike-img"></div>`}
            </div>

            <div>
              <div class="info-grid">
                <div class="value">
                  <div class="label">Bike</div>
                  <strong>${safe(b.make)} ${safe(b.model)}</strong><br>
                  ${safe(b.variant)}
                </div>

                <div class="value">
                  <div class="label">Bike ID</div>
                  <strong>${safe(r.bike_id)}</strong><br>
                  <a class="btn" href="bike-details.html?id=${encodeURIComponent(r.bike_id)}" target="_blank">View Listing</a>
                </div>

                <div class="value">
                  <div class="label">Price</div>
                  <strong>${money(b.price_gbp)}</strong>
                </div>

                <div class="value">
                  <div class="label">Year / Mileage</div>
                  ${safe(b.year)} / ${b.mileage ? Number(b.mileage).toLocaleString("en-GB") + " miles" : "-"}
                </div>
              </div>

              <div class="info-grid">
                <div>
                  <div class="label">Question</div>
                  <strong>${safe(r.question_type)}</strong>
                </div>

                <div>
                  <div class="label">Customer</div>
                  <strong>${safe(r.customer_name)}</strong>
                </div>

                <div>
                  <div class="label">Phone</div>
                  <strong>${safe(r.customer_phone)}</strong>
                </div>

                <div>
                  <div class="label">Email</div>
                  ${safe(r.customer_email)}
                </div>
              </div>

              <div class="info-grid">
                <div>
                  <div class="label">Offer</div>
                  ${r.offer_amount ? money(r.offer_amount) : "-"}
                </div>

                <div>
                  <div class="label">Buyer Shipping Agent</div>
                  ${safe(r.buyer_shipping_agent)}
                </div>

                <div>
                  <div class="label">Customer Country</div>
                  ${safe(r.destination_country)}
                </div>

                <div>
                  <div class="label">Status</div>
                  <select id="status-${r.id}" onchange="updateStatus(${r.id}, this.value)">
                    <option value="New" ${r.status==="New"?"selected":""}>New</option>
                    <option value="Contacted" ${r.status==="Contacted"?"selected":""}>Contacted</option>
                    <option value="Waiting Buyer" ${r.status==="Waiting Buyer"?"selected":""}>Waiting Buyer</option>
                    <option value="Offer Made" ${r.status==="Offer Made"?"selected":""}>Offer Made</option>
                    <option value="Reserved" ${r.status==="Reserved"?"selected":""}>Reserved</option>
                    <option value="Sold" ${r.status==="Sold"?"selected":""}>Sold</option>
                    <option value="Closed" ${r.status==="Closed"?"selected":""}>Closed</option>
                  </select>
                </div>
              </div>

              <div class="message">
                <strong>Buyer Message</strong><br>
                ${safe(r.message)}
              </div>

   <div class="conversation-box">
  <strong>Conversation</strong>

  <div class="message-thread" id="messages-${r.id}">
    Loading messages...
  </div>

  <div class="reply-area">
    <textarea id="msg-${r.id}" placeholder="Type message to customer..."></textarea>
  </div>

  <div class="quick-replies">
    <button onclick="setQuickReply(${r.id},'available')">Still Available</button>
    <button onclick="setQuickReply(${r.id},'accepted')">Offer Accepted</button>
    <button onclick="setQuickReply(${r.id},'rejected')">Offer Rejected</button>
    <button onclick="setQuickReply(${r.id},'photos')">More Photos</button>
    <button onclick="setQuickReply(${r.id},'payment')">Awaiting Payment</button>
    <button onclick="setQuickReply(${r.id},'reserved')">Reserved</button>
  </div>

  <button onclick="sendAdminMessage(${r.id}, '${r.customer_id || ""}')">
    Send Message
  </button>
</div>

<div style="margin-top:12px">
  <strong>Internal Notes</strong>

  <textarea
    id="notes-${r.id}"
    placeholder="Internal notes (not visible to customer)..."
  >${r.internal_notes || ""}</textarea>

  <button onclick="saveNotes(${r.id})">
    Save Notes
  </button>
</div>

            </div>
          </div>
        </div>
      </div>
    `;
   }).join("");

rows.forEach(r=>loadMessages(r.id, r.message, r.customer_name));

if(openEnquiryId){
  const openRow=document.getElementById(`enquiry-${openEnquiryId}`);
  if(openRow){
    openRow.classList.add("open");
  }
}
}
  
function setQuickReply(id,type){
  const replies = {
    available: `Hello,

Thank you for your enquiry.

This motorcycle is still available.

Please let us know if you would like additional photos, a video, export information, or would like to make an offer.

Kind regards,
AnyBike`,

    accepted: `Hello,

Thank you for your offer.

We are pleased to confirm your offer has been accepted, subject to payment and final confirmation.

Kind regards,
AnyBike`,

    rejected: `Hello,

Thank you for your offer.

Unfortunately we are unable to accept that offer at this time.

You are welcome to submit an improved offer for consideration.

Kind regards,
AnyBike`,

    photos: `Hello,

Thank you for your enquiry.

We can arrange additional photos or video of this motorcycle.

Please let us know what areas you would like us to focus on.

Kind regards,
AnyBike`,

    payment: `Hello,

Thank you.

We are currently awaiting payment before proceeding further with this transaction.

Kind regards,
AnyBike`,

    reserved: `Hello,

Thank you.

This motorcycle is currently reserved pending payment and final confirmation.

Kind regards,
AnyBike`
  };

  const box=document.getElementById(`msg-${id}`);
  if(box){
    box.value=replies[type] || "";
    box.focus();
  }
}

async function updateStatus(id,status){
  const {error}=await sb.rpc("admin_update_enquiry_status", {
    enquiry_id:Number(id),
    new_status:status
  });

  if(error){
    alert("Status save failed: " + error.message);
    return;
  }

  alert("Saved: " + status);
  loadEnquiries();
}

async function loadMessages(enquiryId, originalMessage="", customerName="Customer"){
  const box=document.getElementById(`messages-${enquiryId}`);
  if(!box) return;

  const {data,error}=await sb
    .from("enquiry_messages")
    .select("*")
    .eq("enquiry_id",Number(enquiryId))
    .order("created_at",{ascending:true});

  if(error){
    box.innerHTML=`<div class="small">${error.message}</div>`;
    return;
  }

  let html = "";

  if(originalMessage && originalMessage !== "-"){
    html += `
      <div class="msg customer">
        <strong>${safe(customerName)}</strong>
        <div>${safe(originalMessage)}</div>
      </div>
    `;
  }

  if(data && data.length){
    html += data.map(m=>{
      const sender=safe(m.sender);
      const cls=sender.toLowerCase().includes("customer") ? "customer" : "admin";

      return `
        <div class="msg ${cls}">
          <strong>${sender}</strong>
          <div>${safe(m.message)}</div>
          <small>${m.created_at ? new Date(m.created_at).toLocaleString("en-GB") : ""}</small>
        </div>
      `;
    }).join("");
  }

  box.innerHTML = html || "<div class='small'>No conversation yet</div>";
}
  
async function sendAdminMessage(enquiryId,customerId){
  const txt=document.getElementById(`msg-${enquiryId}`);
  const message=txt.value.trim();

  if(!message){
    alert("Enter a message");
    return;
  }

  const {error}=await sb.rpc("admin_send_enquiry_message",{
    p_enquiry_id:Number(enquiryId),
    p_customer_id:customerId || null,
    p_message:message
  });

  if(error){
    alert("Message failed: " + error.message);
    return;
  }

  txt.value="";

  await loadMessages(
    enquiryId,
    document.querySelector(`#enquiry-${enquiryId} .message strong`)?.innerText || "",
    "Customer"
  );
}
  
async function saveNotes(id){
  const notes=document.getElementById(`notes-${id}`).value;

  const {error}=await sb
    .from("bike_enquiries")
    .update({internal_notes:notes})
    .eq("id",Number(id));

  if(error){
    alert("Notes save failed: " + error.message);
    return;
  }

  alert("Notes saved");
}

loadEnquiries();

setInterval(() => {
  loadEnquiries();
}, 90000);
</script>
</body>
</html>
