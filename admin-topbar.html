<div class="admin-topbar">
  <div class="admin-search">
    <span>🔍</span>
    <input id="adminGlobalSearch" placeholder="Search AnyBike admin — customer, bike, buyer, invoice, container...">
  </div>

  <div class="admin-actions">
    <button class="admin-bell" onclick="toggleAdminNotifications()">
      🔔
      <span class="admin-bell-count" id="adminNotificationCount">0</span>
    </button>

    <div class="admin-profile">Andy Gifford</div>
  </div>

  <div class="admin-notification-panel" id="adminNotificationPanel">
    <div class="admin-notification-head">
      <strong>Admin Notifications</strong>
      <small id="adminNotificationStatus">Live</small>
    </div>
    <div class="admin-notification-list" id="adminNotificationList">
      <div class="admin-notification-item">
        <strong>No notifications yet</strong>
        <small>Admin alerts will appear here.</small>
      </div>
    </div>
  </div>
</div>
